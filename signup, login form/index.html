<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>
    <link rel="stylesheet" href="css/auth.css">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="main-container">
        
        <!-- Signup Form Section -->
        <div class="form-container signup-container" id="signupSection">
            <form id="signupForm">
                <h2>Create Account</h2>
                <div class="social-icons">
                    <i class="fab fa-facebook-f"></i>
                    <i class="fab fa-google"></i>
                    <i class="fab fa-linkedin-in"></i>
                </div>
                <span>or use your email for registration</span>
                
                <div class="input-group">
                    <input type="text" id="signupName" placeholder="Name" required />
                    <i class="fas fa-user"></i>
                    <small class="error-msg"></small>
                </div>
                
                <div class="input-group">
                    <input type="email" id="signupEmail" placeholder="Email" required />
                    <i class="fas fa-envelope"></i>
                    <small class="error-msg"></small>
                </div>
                
                <div class="input-group">
                    <input type="password" id="signupPassword" placeholder="Password" required />
                    <i class="fas fa-lock"></i>
                    <small class="error-msg"></small>
                </div>

                <button type="submit" class="btn">Sign Up</button>
                
                <p class="switch-text">Already have an account? <a href="#" id="showLogin">Login</a></p>
            </form>
        </div>

        <!-- Login Form Section -->
        <div class="form-container login-container" id="loginSection" style="display: none;">
            <form id="loginForm">
                <h2>Sign In</h2>
                <div class="social-icons">
                    <i class="fab fa-facebook-f"></i>
                    <i class="fab fa-google"></i>
                    <i class="fab fa-linkedin-in"></i>
                </div>
                <span>or use your email password</span>
                
                <div class="input-group">
                    <input type="email" id="loginEmail" placeholder="Email" required />
                    <i class="fas fa-envelope"></i>
                    <small class="error-msg"></small>
                </div>
                
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Password" required />
                    <i class="fas fa-lock"></i>
                    <small class="error-msg"></small>
                </div>

                <a href="#" class="forgot-pass">Forget Your Password?</a>
                <button type="submit" class="btn">Login</button>
                
                <p class="switch-text">Don't have an account? <a href="#" id="showSignup">Sign Up</a></p>
            </form>
        </div>

    </div>

    <!-- Success Modal (Hidden by default) -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <i class="fas fa-check-circle"></i>
            <h3 id="modalMsg">Success!</h3>
            <button onclick="closeModal()">OK</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
